name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore & Build
        run: |
          if [ -d "TriviUpBackend" ]; then
            dotnet restore TriviUpBackend/TriviUpBackend.csproj
            dotnet build TriviUpBackend/TriviUpBackend.csproj --configuration Release
          else
            echo "Directorio TriviUpBackend no encontrado. Verifica la ruta."
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Unit Tests
        run: |
          mkdir -p UnitTestResults coverage
          TEST_PROJECT=$(find . -name "*Test*.csproj" | head -n 1)
          if [ -n "$TEST_PROJECT" ]; then
            echo "Ejecutando tests unitarios en: $TEST_PROJECT"
            dotnet test $TEST_PROJECT \
              --configuration Release \
              --logger "trx;LogFileName=$(pwd)/UnitTestResults/UnitTestResults.trx" \
              /p:CollectCoverage=true \
              /p:CoverletOutput="$(pwd)/coverage/" \
              /p:CoverletOutputFormat=cobertura
          else
            echo "No se encontró ningún proyecto de tests unitarios (*Test*.csproj)."
          fi

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: reportgenerator "-reports:$(pwd)/coverage/coverage.cobertura.xml" "-targetdir:$(pwd)/coverage-report" -reporttypes:Html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30

  bruno-tests:
    name: Bruno API Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      Development: "true"
      ASPNETCORE_ENVIRONMENT: Development
      # Variables de entorno adicionales si las necesitas:
      # JWT_KEY: ${{ secrets.JWT_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build backend
        run: |
          if [ -d "TriviUpBackend" ]; then
            dotnet nuget locals all --clear
            dotnet restore TriviUpBackend/TriviUpBackend.csproj --force
            dotnet build TriviUpBackend/TriviUpBackend.csproj --configuration Release --no-restore
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Start backend server
        run: |
          echo "Starting server..."
          # El puerto por defecto en appsettings o Program.cs podría variar. Ajusta si tu app corre en otro puerto localmente.
          dotnet run --project TriviUpBackend/TriviUpBackend.csproj \
            --configuration Release \
            --no-build \
            --urls "http://localhost:5041" &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5041/health || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Server ready after $i seconds ($STATUS)"
              break
            fi
            sleep 1
          done

      - name: Run Bruno Tests
        run: |
          mkdir -p bruno-reports
          if [ -d "bruno/collections/TriviUp API" ]; then
            cd "bruno/collections/TriviUp API"
            bru run --env Local --format json --output ../../bruno-reports/results.json
          else
            echo "No se encontró el directorio de tests de bruno (bruno/collections/TriviUp API)."
          fi

      - name: Generate HTML Report
        run: |
          if [ -f "bruno-reports/results.json" ]; then
            TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bruno API Test Report</title><style>body{font-family:Arial,sans-serif;margin:20px;background:#f5f5f5}.container{max-width:1200px;margin:0 auto;background:white;padding:20px;border-radius:8px}h1{color:#333}.summary{display:flex;gap:20px;margin:20px 0}.stat{background:#f8f9fa;padding:15px 25px;border-radius:8px;text-align:center}.stat.pass{border-left:4px solid #28a745}.stat.fail{border-left:4px solid #dc3545}.stat h2{margin:0;font-size:2em}.stat p{margin:5px 0 0;color:#666}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{padding:12px;text-align:left;border-bottom:1px solid #ddd}th{background:#f8f9fa}.status-pass{color:#28a745;font-weight:bold}.status-fail{color:#dc3545;font-weight:bold}.timestamp{color:#666;font-size:0.9em}</style></head><body><div class="container"><h1>Bruno API Test Report</h1><p class="timestamp">Generated:' "$TS" > bruno-reports/index.html
            echo '</p><div class="summary"><div class="stat pass"><h2 id="passed">-</h2><p>Passed</p></div><div class="stat fail"><h2 id="failed">-</h2><p>Failed</p></div><div class="stat"><h2 id="total">-</h2><p>Total</p></div></div><table><thead><tr><th>Test</th><th>Method</th><th>URL</th><th>Status</th><th>Duration</th></tr></thead><tbody id="results"></tbody></table></div><script>fetch("results.json").then(r=>r.json()).then(data=>{const results=data.results||[];const passed=results.filter(r=>r.status==="pass").length;const failed=results.filter(r=>r.status==="fail").length;document.getElementById("passed").textContent=passed;document.getElementById("failed").textContent=failed;document.getElementById("total").textContent=results.length;const tbody=document.getElementById("results");results.forEach(r=>{const tr=document.createElement("tr");tr.innerHTML="<td>"+(r.name||r.url||"Unknown")+"</td><td>"+(r.method||"-")+"</td><td>"+(r.url||"-")+"</td><td class=\"status-"+r.status+"\">"+r.status.toUpperCase()+"</td><td>"+(r.durationMs?r.durationMs+"ms":"-")+"</td>";tbody.appendChild(tr);});}).catch(e=>console.error("Error:",e));</script></body></html>' >> bruno-reports/index.html
          else
            echo "No results.json found"
          fi

      - name: Upload Bruno Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bruno-api-report
          path: bruno-reports/
          retention-days: 30

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi
