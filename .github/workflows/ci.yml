name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build
        run: |
          if [ -d "TriviUpBackend" ]; then
            dotnet restore TriviUpBackend/TriviUpBackend.csproj
            dotnet build TriviUpBackend/TriviUpBackend.csproj --configuration Release
          else
            echo "Directorio TriviUpBackend no encontrado. Verifica la ruta."
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Unit Tests
        run: |
          mkdir -p UnitTestResults coverage
          TEST_PROJECT=$(find . -name "*Test*.csproj" | head -n 1)
          if [ -n "$TEST_PROJECT" ]; then
            echo "Ejecutando tests unitarios en: $TEST_PROJECT"
            dotnet test $TEST_PROJECT \
              --configuration Release \
              --logger "trx;LogFileName=$(pwd)/UnitTestResults/UnitTestResults.trx" \
              /p:CollectCoverage=true \
              /p:CoverletOutput="$(pwd)/coverage/" \
              /p:CoverletOutputFormat=cobertura
          else
            echo "No se encontró ningún proyecto de tests unitarios (*Test*.csproj)."
          fi

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: reportgenerator "-reports:$(pwd)/coverage/coverage.cobertura.xml" "-targetdir:$(pwd)/coverage-report" -reporttypes:Html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30
